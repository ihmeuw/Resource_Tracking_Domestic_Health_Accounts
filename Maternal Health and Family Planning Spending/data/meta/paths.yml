# paths.yml
# Define paths to data directories and other resources
#
# raw: data that is considered to be an input to one or more pipelines.
#     Add new directories as needed to point to new data sources.
# int: intermediate data that is generated by the extraction or analysis pipelines
#     Create directories inside int:data: as needed, but they do not need be added here.
#     The int:logs: directory is used to store log files generated by pipelines
# fin: final outputs, deliverables, figures, etc. generated by pipelines
#     Create directories inside fin:outputs: or fin:data: directories as needed,
#       but they do not need be added here.
#


raw:
    # general location for inputs to the project
    input: "/FILEPATH/"
    # location of CRS_1973_2022.csv
    crs: "/FILEPATH/"
    dah_integrated_db: "/FILEPATH/"
    dah_data_reqs: "/FILEPATH/"
    # location of EI THE data
    ei_the: "/FILEPATH/"
    # location of EI GDP data
    ei_gdp: "/FILEPATH/"
    # location of EI oda data
    ei_oda: "/FILEPATH/"

int:
    # generated data
    data: "/FILEPATH/"
    # log files
    logs: "/FILEPATH/"
    # ST-GPR outputs
    stgpr_output: "/FILEPATH/"

fin:
    # final outputs (figures, etc.)
    outputs: "/FILEPATH/"
    # final data sets
    data: "/FILEPATH/"
