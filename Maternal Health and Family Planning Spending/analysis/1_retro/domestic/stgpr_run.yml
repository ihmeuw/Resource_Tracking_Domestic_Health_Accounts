# control model runs
#
#  -- schema --
# value_id:
#     stage1_select: boolean (whether or not to run stage1 model selection for this value_id)
#     run: boolean (whether or not to run st-gpr model for this value_id)
#     nparallel: int (arg passed to stgpr_sendoff, number of parallel jobs to use)
#     custom_stage1_file: str (optional file name to a prepped custom stage 1
#                              within the model_value's directory)
#

# reproductive health spending
public_dis2.1:
    stage1_select: true
    run: true
    nparallel: 20
    custom_stage1_file: ""

